language: go
go:
  - 1.6.2

sudo: required

services:
  - docker

branches:
  only:
    - master
    - /^test_/
    - /^test-/

install:
  - go test -i ./lekube-fetch

script:
  - go test -v ./lekube-fetch
  - GOOS=linux GOARCH=amd64 go build -o ./lekube-fetch/lekube-fetch ./lekube-fetch
  - ./travis_docker_push.sh